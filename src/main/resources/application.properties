spring.application.name=bt4-seller-wizard

spring.datasource.url=jdbc:h2:mem:seller_wizard;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
logging.level.root=INFO

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.thymeleaf.cache=false

# Tự động hủy session bỏ dở để giảm rác RAM khi người dùng dừng ở giữa wizard.
server.servlet.session.timeout=15m
